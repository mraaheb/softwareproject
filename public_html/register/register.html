<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Adud — Register</title>

  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="register.css"/>
</head>

<body>

<div class="container">

  <!-- LEFT -->
  <div class="left">
    <img src="../../images/logo.png" class="logo"/>
    <h1>عضد</h1>
    <p>Medical transport platform</p>

    <div class="features">
      <span>Safe & Secure</span>
      <span>Easy Booking</span>
      <span>Smart Profile</span>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">

    <h2>Create Account</h2>

    <label>Full Name</label>
    <input type="text" id="name"/>

    <!-- ROLE -->
    <label>Role</label>
    <div class="role-group">
      <label class="role-card">
        <input type="radio" name="role" value="patient" checked>
        <div class="role-title">Patient</div>
      </label>

      <label class="role-card">
        <input type="radio" name="role" value="provider">
        <div class="role-title">Provider</div>
      </label>
    </div>

    <label>Email</label>
    <input type="email" id="email"/>

    <label>Password</label>
    <input type="password" id="password"/>

    <!-- PATIENT -->
    <div id="patientFields">

      <h3>Medical Information</h3>

      <label>Phone</label>
      <input type="text" id="phone"/>

      <label>Date of Birth</label>
      <input type="date" id="dob"/>

      <h4>Mobility Requirements</h4>

      <div class="mobility-grid">

        <label class="mobility-card">
         
            <input type="checkbox" id="wheelchair"/>
           
          <div class="icon">♿</div>
          <div>Wheelchair</div>
        </label>

        <label class="mobility-card">
          <input type="checkbox" id="oxygen"/>
          <div class="icon">🫁</div>
          <div>Oxygen</div>
        </label>

        <label class="mobility-card">
          <input type="checkbox" id="companion"/>
          <div class="icon">🤝</div>
          <div>Companion</div>
        </label>

      </div>
    </div>

    <button onclick="register()">Register</button>

    <p class="link">
      Already have an account?
      <a href="../login/login.html">Login</a>
    </p>

  </div>
</div>

<script src="../app-data.js"></script>
<script src="register.js"></script>

</body>
</html>
