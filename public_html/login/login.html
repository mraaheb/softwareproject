<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Adud — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="login.css">
</head>
<body>

<div class="login-container">
    <div class="login-card">
        <div class="login-brand">
            <div class="logo-box">🏥</div>
            <div>
                <div class="brand-ar">عضد</div>
                <div class="brand-en">ADUD</div>
            </div>
        </div>
        <h1 class="login-title">Welcome Back / أهلاً بك</h1>
        <p class="login-subtitle">Sign in to your account / تسجيل الدخول</p>

        <div class="form-group">
            <label>Email / البريد الإلكتروني</label>
            <input type="email" id="email" placeholder="example@email.com"/>
        </div>
        <div class="form-group">
            <label>Password / كلمة المرور</label>
            <input type="password" id="password" placeholder="••••••••"/>
        </div>

        <div id="errorMsg" class="error-msg" style="display:none;"></div>

        <button class="btn-login" onclick="handleLogin()">Login / دخول</button>

        <div class="login-footer">
            <span>Are you a provider? / هل أنت مزود خدمة؟</span>
            <a href="../provider-dashboard/provider-dashboard.html">Provider Login / دخول المزود</a>
        </div>
    </div>
</div>

<script src="login.js"></script>
</body>
</html>
